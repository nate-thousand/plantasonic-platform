<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Instrument workspace layout diagram">
  <title>Instrument Workspace  fullscreen stage with floating overlays</title>
  <rect width="640" height="360" fill="#0d1117" rx="8"/>
  <rect x="8" y="8" width="624" height="344" fill="#161b22" stroke="#30363d" stroke-width="1" rx="4"/>
  <text x="320" y="180" text-anchor="middle" fill="#58a6ff" font-family="ui-monospace, monospace" font-size="14">STAGE (fullscreen)</text>
  <rect x="16" y="48" width="96" height="264" fill="#21262d" stroke="#8b949e" stroke-width="1" rx="4" stroke-dasharray="4 2"/>
  <text x="64" y="72" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Preset</text>
  <text x="64" y="86" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Browser</text>
  <rect x="528" y="48" width="96" height="200" fill="#21262d" stroke="#8b949e" stroke-width="1" rx="4" stroke-dasharray="4 2"/>
  <text x="576" y="72" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Floating</text>
  <text x="576" y="86" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Inspector</text>
  <rect x="520" y="16" width="104" height="24" fill="#21262d" stroke="#3fb950" stroke-width="1" rx="4"/>
  <text x="572" y="32" text-anchor="middle" fill="#3fb950" font-family="system-ui, sans-serif" font-size="9">Status HUD</text>
  <rect x="200" y="312" width="240" height="32" fill="#21262d" stroke="#d29922" stroke-width="1" rx="4"/>
  <text x="320" y="332" text-anchor="middle" fill="#d29922" font-family="system-ui, sans-serif" font-size="10">Floating Transport</text>
  <rect x="240" y="16" width="160" height="20" fill="#21262d" stroke="#a371f7" stroke-width="1" rx="4" opacity="0.7"/>
  <text x="320" y="30" text-anchor="middle" fill="#a371f7" font-family="system-ui, sans-serif" font-size="9">Command Palette (optional)</text>
</svg>
