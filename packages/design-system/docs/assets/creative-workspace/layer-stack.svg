<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Creative workspace layer diagram">
  <title>Creative Workspace sits between Application Shell and content</title>
  <rect width="640" height="360" fill="#0d1117" rx="8"/>
  <rect x="24" y="24" width="592" height="48" fill="#21262d" stroke="#58a6ff" stroke-width="2" rx="4"/>
  <text x="320" y="54" text-anchor="middle" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Application Shell</text>
  <text x="320" y="68" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">navigation · theme · commands · notifications</text>
  <rect x="24" y="88" width="592" height="200" fill="#161b22" stroke="#3fb950" stroke-width="2" rx="4"/>
  <text x="320" y="112" text-anchor="middle" fill="#3fb950" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Creative Workspace</text>
  <text x="320" y="128" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">preset layouts · floating surfaces · stage dominance</text>
  <rect x="48" y="144" width="544" height="128" fill="#0d1117" stroke="#f0883e" stroke-width="1" rx="4"/>
  <text x="320" y="210" text-anchor="middle" fill="#f0883e" font-family="ui-monospace, monospace" font-size="12">Application Content (stage / canvas / scene)</text>
  <rect x="24" y="304" width="592" height="32" fill="#21262d" stroke="#8b949e" stroke-width="1" rx="4"/>
  <text x="320" y="324" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Engines · domain logic · business rules (out of scope for DS)</text>
</svg>
