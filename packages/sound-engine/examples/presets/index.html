<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Plantasia — Presets Example</title>
  </head>
  <body>
    <h1>Presets Example</h1>
    <p>Browse and play built-in presets from JSON catalog.</p>
    <select id="preset-select"></select>
    <button type="button" id="btn-start">Start Audio</button>
    <button type="button" id="btn-play">Play Preset</button>
    <button type="button" id="btn-stop">Stop</button>
    <p id="status"></p>
    <script type="module" src="./main.js"></script>
  </body>
</html>
