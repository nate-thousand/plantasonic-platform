<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Plantasia — Effects Example</title>
  </head>
  <body>
    <h1>Effects Example</h1>
    <p>Live botanical controls map to delay, reverb, filter, and LFO (effect rack scaffold in src/effects/).</p>
    <button type="button" id="btn-start">Start Audio</button>
    <button type="button" id="btn-play">Play Note</button>
    <button type="button" id="btn-stop">Stop</button>
    <label>Space <input type="range" id="space" min="0" max="100" value="44" /></label>
    <label>Texture <input type="range" id="texture" min="0" max="100" value="57" /></label>
    <p id="status"></p>
    <script type="module" src="./main.js"></script>
  </body>
</html>
